{% extends 'base.html' %}

{% block auth_content %}
    <div class="auth-form">
        <h1 style="color: #008C1E; margin-bottom: 30px;">Toliq</h1>
        <h2 style="margin-bottom: 25px;">Вход в аккаунт</h2>
        {% if messages %}
            {% for message in messages %}
                {% if 'login' in message.tags %}
                    <div style="padding: 14px; border-radius: 8px; margin-bottom: 20px;
                                background: #4d1a1a; color: #ff6b6b;">
                        {{ message }}
                    </div>
                {% endif %}
            {% endfor %}
        {% endif %}
        <form method="post">
            {% csrf_token %}
            <input type="text" name="username" placeholder="Имя пользователя" required
                   style="width:100%; padding:14px; margin:8px 0; font-size:16px;">
            <input type="password" name="password" placeholder="Пароль" required
                   style="width:100%; padding:14px; margin:8px 0; font-size:16px;">

            <button type="submit" class="btn-green" style="width:100%; margin-top:15px; padding:14px;">
                Войти
            </button>
        </form>

        <p style="margin-top: 20px; color: #aaa;">
            Нет аккаунта?
            <a href="{% url 'register' %}" style="color: #008C1E;">Зарегистрироваться</a>
        </p>
        <p style="text-align: center; margin: 8px 0;">
            <a href="{% url 'password_reset' %}" style="color: #008C1E;">Забыли пароль?</a>
        </p>
    </div>
{% endblock %}
