{% extends 'base.html' %}

{% block auth_content %}
    <div class="auth-form" style="max-width: 380px;">
        <h1 style="color: #008C1E; margin-bottom: 8px; font-size: 36px;">Toliq</h1>
        <h2 style="margin-bottom: 35px; color: #e0e0e0;">Восстановление пароля</h2>

        {% if messages %}
            {% for message in messages %}
                {% if 'reset_password' in message.tags %}
                    <div style="padding: 16px; border-radius: 10px; margin-bottom: 25px; font-size: 15.5px; text-align: center;"
                         class="{% if 'success' in message.tags %}success-msg{% else %}error-msg{% endif %}">
                        {{ message }}
                    </div>
                {% endif %}
            {% endfor %}
        {% endif %}

        <form method="post">
            {% csrf_token %}   <!-- Должен быть именно здесь -->

            <div style="text-align: left; margin-bottom: 20px;">
                <label style="color: #aaa; font-size: 14px; display: block; margin-bottom: 7px;">Имя пользователя</label>
                <input type="text" name="username" placeholder="Введите имя пользователя" required
                       style="width: 100%; padding: 14px; background: #222; border: 1px solid #444; border-radius: 8px; color: white;">
            </div>

            <div style="text-align: left; margin-bottom: 20px;">
                <label style="color: #aaa; font-size: 14px; display: block; margin-bottom: 7px;">Новый пароль</label>
                <input type="password" name="new_password" placeholder="Новый пароль" required
                       style="width: 100%; padding: 14px; background: #222; border: 1px solid #444; border-radius: 8px; color: white;">
            </div>

            <div style="text-align: left; margin-bottom: 28px;">
                <label style="color: #aaa; font-size: 14px; display: block; margin-bottom: 7px;">Повторите новый пароль</label>
                <input type="password" name="confirm_password" placeholder="Повторите новый пароль" required
                       style="width: 100%; padding: 14px; background: #222; border: 1px solid #444; border-radius: 8px; color: white;">
            </div>

            <button type="submit" class="btn-green" style="width: 100%; padding: 15px; font-size: 16px;">
                Сменить пароль
            </button>
        </form>

        <p style="margin-top: 25px; color: #aaa;">
            <a href="{% url 'login' %}" style="color: #008C1E;">← Вернуться ко входу</a>
        </p>
    </div>
{% endblock %}
