<div class="right-sidebar">
    <h3 style="margin-bottom: 20px; color: #008C1E;">Возможно, знаете</h3>

    {% for user in suggested_users %}
        <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 18px;">

            <!-- Аватарка -->
            <div style="width: 46px; height: 46px; border-radius: 50%; overflow: hidden;
                        background: #1f1f1f; flex-shrink: 0;">

                {% if user.avatar and user.avatar.url %}
                    <img src="{{ user.avatar.url }}" style="width: 100%; height: 100%; object-fit: cover;" alt="">
                {% else %}
                    <!-- Принудительно показываем инициалы -->
                    <div style="width: 100%; height: 100%; background: #1f1f1f;
                                display: flex; align-items: center; justify-content: center;
                                font-size: 19px; font-weight: bold; color: #ddd;">
                        {{ user.username|slice:":2"|upper }}
                    </div>
                {% endif %}
            </div>

            <!-- Имя -->
            <div style="flex: 1; min-width: 0;">
                <p style="margin: 0; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">
                    {{ user.username }}
                </p>
            </div>

            <a href="{% url 'chat' user.id %}" class="btn-green" style="padding: 8px 16px; font-size: 13.5px;text-decoration:none">
                Написать
            </a>
        </div>
    {% endfor %}
</div>
