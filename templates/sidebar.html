<div class="sidebar">
    <div class="logo">Toliq</div>

    <a href="{% url 'feed' %}"
       class="nav-link {% if request.resolver_match.url_name == 'feed' %}active{% endif %}">
        <span class="icon">🏠</span>
        <span class="text">Лента</span>
    </a>

    <a href="{% url 'messages_list' %}"
       class="nav-link {% if request.resolver_match.url_name == 'messages_list' %}active{% endif %}">
        <span class="icon">✉️</span>
        <span class="text">Сообщения</span>
    </a>

    <a href="{% url 'my_profile' %}"
       class="nav-link {% if request.resolver_match.url_name in 'my_profile|profile' %}active{% endif %}">
        <span class="icon">👤</span>
        <span class="text">Профиль</span>
    </a>

    <a href="{% url 'search_users' %}"
       class="nav-link {% if request.resolver_match.url_name == 'search_users' %}active{% endif %}">
        <span class="icon">🔍</span>
        <span class="text">Поиск</span>
    </a>

    <a href="{% url 'logout' %}" class="nav-link logout">
        <span class="icon">⬅️</span>
        <span class="text">Выйти</span>
    </a>
</div>
